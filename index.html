<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0a'/%3E%3Cpath d='M30 25 L70 75' stroke='%23add8e6' stroke-width='16' stroke-linecap='round'/%3E%3Cpath d='M70 25 L30 75' stroke='%23ffffff' stroke-width='16' stroke-linecap='round' opacity='0.8'/%3E%3C/svg%3E" />
    <title> wmoneyX </title>
  </head>
  <body>
    <!-- 1. Thêm thẻ này vào ngay sau thẻ <body> -->
    <div id="bubble-overlay"></div>

    <!-- 2. CSS để định vị và tạo hiệu ứng -->
    <style>
        #bubble-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none; /* Giúp vẫn click được các nút bên dưới */
            z-index: 999999;      /* Luôn nằm trên cùng */
            overflow: hidden;
            contain: strict;
        }

        /* Chiếc lá rơi */
        .leaf {
            position: absolute;
            top: -50px;
            border-radius: 15px 0 15px 0; /* Hình dáng chiếc lá */
            background: linear-gradient(135deg, #fbbf24, #ea580c); /* Vàng cam */
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), 1px 1px 3px rgba(0,0,0,0.2);
            will-change: transform, opacity;
            animation: fall-and-sway var(--duration) linear infinite;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            opacity: 0.8;
        }

        /* Gân lá */
        .leaf::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(15deg);
        }

        /* Chuyển động rơi và lắc lư */
        @keyframes fall-and-sway {
            0% { 
                transform: translate3d(0, -50px, 0) rotate(0deg); 
                opacity: 0; 
            }
            10% { 
                opacity: 0.8; 
            }
            50% { 
                /* Lắc lư ngang */
                transform: translate3d(var(--sway), 50vh, 0) rotate(180deg); 
            }
            90% { 
                opacity: 0.8; 
            }
            100% { 
                /* Rơi quá màn hình và tan biến */
                transform: translate3d(calc(var(--sway) * -1), 110vh, 0) rotate(360deg); 
                opacity: 0; 
            }
        }
    </style>

    <!-- 3. JavaScript để tạo bong bóng ngẫu nhiên -->
    <script>
        function updateBubblesVisibility() {
            const container = document.getElementById('bubble-overlay');
            if (!container) return;
            const isEnabled = localStorage.getItem('bubbles_enabled') !== 'false';
            container.style.display = isEnabled ? 'block' : 'none';
        }

        function initBubbles() {
            const container = document.getElementById('bubble-overlay');
            if (!container) return;
            
            // Clear existing bubbles if any (for re-init)
            container.innerHTML = '';
            
            updateBubblesVisibility();
            
            const count = 25; // Số lượng lá
            const fragment = document.createDocumentFragment();
            
            for (let i = 0; i < count; i++) {
                const b = document.createElement('div');
                const widthVal = Math.random() * 10 + 10; // 10px - 20px
                const heightVal = widthVal * 1.5; // Tỷ lệ lá
                
                b.className = 'leaf';
                b.style.width = widthVal + 'px';
                b.style.height = heightVal + 'px';
                b.style.left = Math.random() * 100 + '%';
                
                // Độ lắc lư ngẫu nhiên
                const sway = (Math.random() * 100 - 50) + 'px';
                b.style.setProperty('--sway', sway);
                
                // Thời gian rơi ngẫu nhiên từ 8s đến 15s
                b.style.setProperty('--duration', Math.random() * 7 + 8 + 's');
                // Độ trễ ngẫu nhiên
                b.style.animationDelay = Math.random() * 10 + 's';
                
                fragment.appendChild(b);
            }
            container.appendChild(fragment);
        }

        // Chạy hàm khi trang web tải xong
        window.addEventListener('load', initBubbles);
        
        // Listen for custom event to toggle bubbles
        window.addEventListener('toggle-bubbles', updateBubblesVisibility);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
